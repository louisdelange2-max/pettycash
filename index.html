<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petty Cash App Live v5 Fixed</title>

  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <style>
    :root{
      --bg:#f5f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --primary:#2563eb; --primary-dark:#1d4ed8; --success:#15803d; --danger:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:min(1500px,96vw);margin:0 auto;padding:20px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
    .brand{font-size:24px;font-weight:700}
    .muted{color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .grid{display:grid;gap:16px}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    @media (max-width:900px){.grid-3,.grid-4{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:stretch}}
    @media (min-width:1200px){.app{padding:24px}.card{padding:20px}.grid-3{grid-template-columns:repeat(3,minmax(280px,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(220px,1fr))}table{font-size:13px}th,td{padding:10px 8px}}
    h1,h2,h3{margin:0 0 10px}
    .stat{display:flex;flex-direction:column;gap:8px}
    .stat .value{font-size:28px;font-weight:700}
    .success{color:var(--success)} .danger{color:var(--danger)}
    input,select,textarea,button{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #cbd5e1;font-size:14px;font-family:inherit}
    textarea{min-height:90px;resize:vertical}
    button{border:none;background:var(--primary);color:#fff;cursor:pointer;font-weight:700}
    button:hover{background:var(--primary-dark)}
    button.secondary{background:#e5e7eb;color:#111827}
    button.secondary:hover{background:#d1d5db}
    button.success-btn{background:var(--success)}
    button.danger-btn{background:var(--danger)}
    button:disabled{opacity:.65;cursor:not-allowed}
    .row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .row-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    @media (max-width:700px){.row,.row-3{grid-template-columns:1fr}}
    .stack{display:flex;flex-direction:column;gap:12px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}.actions>*{flex:1 1 140px}
    .hidden{display:none!important}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:top}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .entry-type{font-weight:700;text-transform:uppercase;font-size:12px}.credit{color:var(--success)}.debit{color:var(--danger)}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .nav button.active{background:#111827;color:#fff}
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-box{width:min(460px,100%)}
    .small{font-size:12px}
    .banner{padding:12px 14px;border-radius:14px;margin-bottom:16px;font-size:14px}
    .banner.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .banner.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}
    .banner.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .right{text-align:right}.section-title{margin-bottom:14px}.nowrap{white-space:nowrap}
.my-entries-table-wrap{display:block}
.my-entries-mobile-list{display:none}
.my-entry-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;margin-bottom:12px;box-shadow:var(--shadow)}
.my-entry-date{font-size:13px;color:var(--muted);margin-bottom:12px}
.my-entry-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.my-entry-left{min-width:0;flex:1}
.my-entry-chip{display:inline-block;padding:8px 12px;border-radius:12px;background:#eef2ff;color:#4f46e5;font-weight:700;margin-bottom:10px}
.my-entry-remark{font-size:16px;line-height:1.35;word-break:break-word}
.my-entry-side{text-align:right;min-width:110px}
.my-entry-amount{font-size:22px;font-weight:700}
.my-entry-balance{font-size:12px;color:var(--muted);margin-top:8px}
.my-entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.my-entry-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.my-entry-value{font-size:14px;word-break:break-word}
.my-entry-complete{margin-top:12px}
.recent-entries-table-wrap{display:block}
.recent-entries-mobile-list{display:none}
.recent-entry-card{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff;margin-bottom:12px;box-shadow:var(--shadow)}
.recent-entry-date{font-size:13px;color:var(--muted);margin-bottom:12px}
.recent-entry-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.recent-entry-left{min-width:0;flex:1}
.recent-entry-chip{display:inline-block;padding:8px 12px;border-radius:12px;background:#eef2ff;color:#4f46e5;font-weight:700;margin-bottom:10px}
.recent-entry-remark{font-size:16px;line-height:1.35;word-break:break-word}
.recent-entry-side{text-align:right;min-width:110px}
.recent-entry-amount{font-size:22px;font-weight:700}
.recent-entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.recent-entry-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.recent-entry-value{font-size:14px;word-break:break-word}

.top-actions-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.notice-bell-wrap{position:relative}
.notice-bell{position:relative;min-width:52px;width:auto;padding:12px 14px;background:#fff;color:#111827;border:1px solid var(--line);box-shadow:var(--shadow)}
.notice-enable-btn{min-width:170px;width:auto;padding:12px 14px;background:#fff;color:#111827;border:1px solid var(--line);box-shadow:var(--shadow)}
.notice-enable-btn:hover{background:#f8fafc}
.notice-enable-btn.active{background:#ecfdf5;color:#166534;border-color:#bbf7d0}

.install-app-btn{min-width:140px;width:auto;padding:12px 14px;background:#fff;color:#111827;border:1px solid var(--line);box-shadow:var(--shadow)}
.install-app-btn:hover{background:#f8fafc}
.install-app-btn.hidden{display:none!important}
.notice-bell:hover{background:#f8fafc}
.notice-badge{position:absolute;top:-6px;right:-6px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.notice-panel{position:absolute;right:0;top:calc(100% + 8px);width:min(420px,92vw);max-height:75vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:12px;z-index:50}
.notice-panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.notice-panel-title{font-weight:700}
.notice-clear-btn{width:auto;padding:8px 10px;border-radius:10px;background:#e5e7eb;color:#111827}
.notice-item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;margin-bottom:10px;cursor:pointer}
.notice-item:last-child{margin-bottom:0}
.notice-item:hover{background:#f8fafc}
.notice-title{font-weight:700;margin-bottom:4px}
.notice-meta{font-size:12px;color:var(--muted);margin-top:6px}
.notice-empty{color:var(--muted);font-size:14px;padding:6px 2px}
.blink-highlight{animation:blinkHighlight 1.2s ease-in-out 0s 3}
@keyframes blinkHighlight{
  0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,0);background:transparent}
  50%{box-shadow:0 0 0 4px rgba(37,99,235,.28);background:#eff6ff}
}
@media (max-width:700px){
  .my-entries-table-wrap{display:none}
  .my-entries-mobile-list{display:block}
  .recent-entries-table-wrap{display:none}
  .recent-entries-mobile-list{display:block}
  .my-entry-grid{grid-template-columns:1fr}
  .recent-entry-grid{grid-template-columns:1fr}
  .top-actions-wrap{width:100%}
  .top-actions-wrap > *{flex:1 1 100px}
  .notice-bell-wrap{flex:0 0 auto}
  .notice-bell{min-width:48px;padding:12px}
  .notice-panel{
    position:fixed;
    top:88px;
    left:50%;
    right:auto;
    transform:translateX(-50%);
    width:min(92vw,360px);
    max-height:60vh;
    padding:10px;
    z-index:1000;
  }
}
  </style>
</head>
<body>
  <div id="loginView" class="login-wrap">
    <div class="login-box card stack">
      <div>
        <h1>Petty Cash App Live</h1>
        <div class="muted">Connected to Google Apps Script backend.</div>
      </div>
      <div id="loginBanner" class="banner info">Paste your Apps Script Web App URL below, then login.</div>
      <label><div class="small muted">Apps Script Web App URL</div><input id="loginApiUrl" placeholder="Paste Apps Script Web App URL" /></label>
      <div class="stack">
        <label><div class="small muted">Username</div><input id="loginUsername" value="" /></label>

      </div>
      <button id="loginBtn" type="button">Login</button>
      <button class="secondary install-app-btn hidden" id="loginInstallAppBtn" type="button">Install App</button>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <div class="topbar">
      <div><div class="brand">Petty Cash App Live</div><div class="muted" id="userWelcome"></div></div>
      <div class="top-actions-wrap">
        <div class="pill" id="syncState">Connected</div>
        <button class="secondary notice-enable-btn" id="enableNotificationsBtn" type="button">Enable Notifications</button>
        <button class="secondary install-app-btn hidden" id="installAppBtn" type="button">Install App</button>
        <div class="notice-bell-wrap">
          <button class="notice-bell" id="noticeBellBtn" type="button" aria-label="Notifications">🔔<span class="notice-badge hidden" id="noticeBadge">0</span></button>
          <div class="notice-panel hidden" id="noticePanel"></div>
        </div>
        <button class="secondary" id="refreshBtn" type="button">Refresh</button>
        <button class="secondary" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
    <div id="appBanner" class="banner info hidden"></div>
    <div class="nav" id="navTabs"></div>
    <section id="screen-dashboard" class="screen stack"></section>
    <section id="screen-add-request" class="screen stack hidden"></section>
    <section id="screen-my-entries" class="screen stack hidden"></section>
    <section id="screen-transactions" class="screen stack hidden"></section>
    <section id="screen-users" class="screen stack hidden"></section>
    <section id="screen-settings" class="screen stack hidden"></section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/12.2.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.2.0/firebase-messaging-compat.js"></script>

  <script>
    const STORAGE_KEY = 'petty_cash_app_v5_live_fixed';
    const SA_TIMEZONE = 'Africa/Johannesburg';
    const SESSION_HOURS = 4;
    const LOGIN_BANNER_DEFAULT = 'Paste your Apps Script Web App URL below, then login.';
    const firebaseConfig = {
  apiKey: "AIzaSyCqARi_5Aj06ZE2GRFve_u75u9zI9RRd9c",
  authDomain: "pettycash-earthlabs.firebaseapp.com",
  projectId: "pettycash-earthlabs",
  storageBucket: "pettycash-earthlabs.firebasestorage.app",
  messagingSenderId: "477886037099",
  appId: "1:477886037099:web:1e3f284c52d1f98da5852e",
  measurementId: "G-WPFSZTCEDD"
};
    const FCM_VAPID_PUBLIC_KEY = 'BGsEeKK2g7Q0UssgyH4k0NHztNYk3oeZO9J1_mMJb3IF_0DeQ_vs7_pbng5GgGcLc35lBtA9nFj4Y1dJyQ3XQ-g';

    const SYNC_INTERVAL_MS = 15 * 60 * 1000;
    const state = {
      selectedAdminUserId: 'all',
      apiUrl: '',
      token: '',
      user: null,
      sessionExpiresAt: '',
      lastSyncAt: '',
      settings: { allowBackdate: 'no', maxBackdateDays: '3', currency: 'ZAR' },
      categories: ['fuel','transport','stationery','meals','accommodation','maintenance','site materials','office supplies','other'],
      users: [],
      transactions: [],
      pendingFiles: {},
      pendingOps: [],
      syncTimerId: null,
      isSyncing: false,
      dismissedNotifications: [],
      notificationsOpen: false,
      pendingBlinkId: '',
      sessionTimerId: null,
      browserNotificationsEnabled: false,
      shownBrowserNotificationIds: [],
      fcmToken: '',
      lastLoginBanner: LOGIN_BANNER_DEFAULT,
      lastLoginBannerType: 'info'
    };

    function loadLocal(){
      try{
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        state.apiUrl = saved.apiUrl || '';
        state.token = saved.token || '';
        state.user = saved.user || null;
        state.savedUsername = saved.savedUsername || '';
        state.savedPin = saved.savedPin || '';
        state.sessionExpiresAt = saved.sessionExpiresAt || '';
        state.lastSyncAt = saved.lastSyncAt || '';
        state.dismissedNotifications = Array.isArray(saved.dismissedNotifications) ? saved.dismissedNotifications : [];
        state.browserNotificationsEnabled = !!saved.browserNotificationsEnabled;
        state.shownBrowserNotificationIds = Array.isArray(saved.shownBrowserNotificationIds) ? saved.shownBrowserNotificationIds : [];
        state.fcmToken = saved.fcmToken || '';
        state.pendingFiles = saved.pendingFiles && typeof saved.pendingFiles === 'object' ? saved.pendingFiles : {};
        state.pendingOps = Array.isArray(saved.pendingOps) ? saved.pendingOps : [];
        state.transactions = Array.isArray(saved.transactions) ? saved.transactions : [];
        state.users = Array.isArray(saved.users) ? saved.users : [];
        state.categories = Array.isArray(saved.categories) && saved.categories.length ? saved.categories : state.categories;
        state.settings = saved.settings && typeof saved.settings === 'object' ? Object.assign({}, state.settings, saved.settings) : state.settings;
      }catch(e){}
    }
    function saveLocal(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        apiUrl: state.apiUrl,
        token: state.token,
        user: state.user,
        savedUsername: state.savedUsername || '',
        savedPin: state.savedPin || '',
        sessionExpiresAt: state.sessionExpiresAt || '',
        lastSyncAt: state.lastSyncAt || '',
        dismissedNotifications: state.dismissedNotifications || [],
        browserNotificationsEnabled: !!state.browserNotificationsEnabled,
        shownBrowserNotificationIds: state.shownBrowserNotificationIds || [],
        fcmToken: state.fcmToken || '',
        pendingFiles: state.pendingFiles || {},
        pendingOps: state.pendingOps || [],
        transactions: state.transactions || [],
        users: state.users || [],
        categories: state.categories || [],
        settings: state.settings || {}
      }));
    }
    function clearLocal(){
      const keep = {
        apiUrl: state.apiUrl,
        settings: state.settings,
        categories: state.categories,
        browserNotificationsEnabled: state.browserNotificationsEnabled,
        shownBrowserNotificationIds: state.shownBrowserNotificationIds,
        fcmToken: '',
        dismissedNotifications: state.dismissedNotifications
      };
      localStorage.removeItem(STORAGE_KEY);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(keep));
    }
    function sessionValid(){ return !!(state.token && state.sessionExpiresAt && new Date(state.sessionExpiresAt).getTime() > Date.now()); }

    function todayISO(){
      const now = new Date();
      const parts = new Intl.DateTimeFormat('en-CA', { timeZone: SA_TIMEZONE, year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(now);
      const y = parts.find(p => p.type === 'year').value;
      const m = parts.find(p => p.type === 'month').value;
      const d = parts.find(p => p.type === 'day').value;
      return `${y}-${m}-${d}`;
    }
    function currentSATime(){
      return new Intl.DateTimeFormat('en-GB', { timeZone: SA_TIMEZONE, hour:'2-digit', minute:'2-digit', hour12:false }).format(new Date());
    }
    function formatSADateOnly(value){
      if(!value) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(String(value))) return String(value);
      const dt = new Date(value);
      if(isNaN(dt.getTime())) return String(value);
      const parts = new Intl.DateTimeFormat('en-CA', { timeZone: SA_TIMEZONE, year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(dt);
      const y = parts.find(p => p.type === 'year').value;
      const m = parts.find(p => p.type === 'month').value;
      const d = parts.find(p => p.type === 'day').value;
      return `${y}-${m}-${d}`;
    }
    function normalizeTimeValue(value){
      if (value === null || typeof value === 'undefined') return '';
      const raw = String(value).trim();
      if (!raw) return '';
      const plain = raw.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
      if (plain) return plain[1].padStart(2, '0') + ':' + plain[2];
      if (raw.includes('1899-12-30')) {
        const dt = new Date(raw);
        if (!isNaN(dt.getTime())) {
          return new Intl.DateTimeFormat('en-GB', { timeZone: 'UTC', hour:'2-digit', minute:'2-digit', hour12:false }).format(dt);
        }
      }
      const dt = new Date(raw);
      if (!isNaN(dt.getTime())) {
        return new Intl.DateTimeFormat('en-GB', { timeZone: SA_TIMEZONE, hour:'2-digit', minute:'2-digit', hour12:false }).format(dt);
      }
      return raw;
    }

    function escapeHtml(str){ return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
    function titleCase(str){ return String(str || '').replace(/\b\w/g, c => c.toUpperCase()); }
    function encodeReferenceWithPayment_(referenceNumber, paymentMethod){
      const cleanRef = String(referenceNumber || '').trim();
      const method = String(paymentMethod || 'CASH').trim().toUpperCase();
      return `[[PM:${method}]]${cleanRef}`;
    }
    function getPaymentMethod_(tx){
      const rawRef = String((tx && tx.ReferenceNumber) || '');
      const match = rawRef.match(/^\[\[PM:(CASH|EFT|CARD)\]\]/i);
      return match ? String(match[1] || 'CASH').toUpperCase() : 'CASH';
    }
    function getDisplayReferenceNumber_(tx){
      const rawRef = String((tx && tx.ReferenceNumber) || '');
      return rawRef.replace(/^\[\[PM:(CASH|EFT|CARD)\]\]/i, '').trim();
    }
    function isAdmin(){ return state.user && (state.user.role || state.user.Role) === 'admin'; }
    function money(n){ return new Intl.NumberFormat('en-ZA',{style:'currency',currency:state.settings.currency || 'ZAR',minimumFractionDigits:2}).format(Number(n||0)); }
    function setBanner(message,type='info'){ const el=document.getElementById('appBanner'); el.textContent=message; el.className='banner '+type; el.classList.remove('hidden'); }
    function clearBanner(){ const el=document.getElementById('appBanner'); el.textContent=''; el.className='banner info hidden'; }
    function validateDateAgainstSettings(dateStr){
      if(!dateStr) throw new Error('Date is required.');

      const raw = String(dateStr).trim();
      const today = todayISO();

      // Compare as yyyy-mm-dd strings first
      if (raw >= today) return true;

      const allowBackdate = String(state.settings.allowBackdate || 'no').toLowerCase() === 'yes';
      if (!allowBackdate) throw new Error('Backdating is not allowed.');

      const maxDays = Number(state.settings.maxBackdateDays || 0);

      const start = new Date(raw + 'T00:00:00');
      const end = new Date(today + 'T00:00:00');
      if (isNaN(start.getTime()) || isNaN(end.getTime())) throw new Error('Invalid date.');

      const diffDays = Math.floor((end.getTime() - start.getTime()) / 86400000);
      if (diffDays > maxDays) {
        throw new Error('Backdating cannot be more than ' + maxDays + ' day(s).');
      }
      return true;
    }
    function sortTransactionsNewestFirst(items){ return items.slice().sort((a,b) => new Date(b.UpdatedAt || b.CreatedAt || b.FinalDate || b.RequestDate || 0) - new Date(a.UpdatedAt || a.CreatedAt || a.FinalDate || a.RequestDate || 0)); }
    function notificationsSupported(){ return typeof window !== 'undefined' && 'Notification' in window; }
    function pushSupported(){ return typeof window !== 'undefined' && notificationsSupported() && 'serviceWorker' in navigator && typeof window.firebase !== 'undefined' && !!firebase.messaging; }
    let firebaseMessaging = null;
    let firebaseMessagingBound = false;
    async function initFirebaseMessaging(){
      if (!pushSupported()) return null;
      try {
        if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
        if (!firebaseMessaging) firebaseMessaging = firebase.messaging();
        if (!firebaseMessagingBound && firebaseMessaging && typeof firebaseMessaging.onMessage === 'function') {
          firebaseMessaging.onMessage(function(payload){
  try {
    // Prevent duplicate notification
    if (typeof renderNotifications === 'function') {
      renderNotifications();
    }
  } catch (e) {}
});
          firebaseMessagingBound = true;
        }
        return firebaseMessaging;
      } catch (e) {
        return null;
      }
    }
    async function getExistingPushSubscription(){
      return state.fcmToken || '';
    }
    async function getOrCreateFcmToken(requestPermission){
      if (!pushSupported()) return '';
      if (Notification.permission === 'denied') return '';
      let permission = Notification.permission || 'default';
      if (requestPermission && permission !== 'granted') permission = await Notification.requestPermission();
      if (permission !== 'granted') return '';
      const reg = await navigator.serviceWorker.ready;
      const messaging = await initFirebaseMessaging();
      if (!messaging || typeof messaging.getToken !== 'function') return '';
      const token = await messaging.getToken({ vapidKey: FCM_VAPID_PUBLIC_KEY, serviceWorkerRegistration: reg });
      state.fcmToken = token || '';
      saveLocal();
      return token || '';
    }
    async function syncExistingPushSubscription(){
      if (!state.token || !canReachServer() || !pushSupported()) return;
      try {
        const token = await getOrCreateFcmToken(false);
        if (token) {
          await apiCall('savePushSubscription', {
            token: token,
            userAgent: navigator.userAgent || ''
          }, { skipOfflineGuard: true });
        }
      } catch (e) {}

    function syncNotificationButton(){

      const permission = Notification.permission || 'default';
      const enabled = !!state.browserNotificationsEnabled && permission === 'granted' && !!state.fcmToken;
      btn.disabled = false;
      btn.classList.toggle('active', enabled);
      if (!FCM_VAPID_PUBLIC_KEY) btn.textContent = 'Add FCM Key';

    async function enableBrowserNotifications(){

      if (!FCM_VAPID_PUBLIC_KEY) {
        setBanner('FCM VAPID public key is missing in index.html.', 'error');
        syncNotificationButton();
        return false;
      }
      if (Notification.permission === 'denied') {
        state.browserNotificationsEnabled = false;
        saveLocal();
        syncNotificationButton();
        setBanner('Notifications are blocked in this browser. Allow them in browser settings first.', 'error');
        return false;
      }
      try {
        const token = await getOrCreateFcmToken(true);
        state.browserNotificationsEnabled = !!token;
        saveLocal();
        if (!token) {
          syncNotificationButton();
          setBanner('Notification permission was not granted.', 'error');
          return false;
        }
        if (state.token && canReachServer()) {
          await apiCall('savePushSubscription', {
            token: token,
            userAgent: navigator.userAgent || ''
          }, { skipOfflineGuard: true });
        }
        syncNotificationButton();
        setBanner('Firebase push enabled on this device.', 'ok');
        try { maybeShowBrowserNotifications(true); } catch(e) {}
        return true;
      } catch (err) {
        syncNotificationButton();
        setBanner('Could not enable Firebase push: ' + (err.message || err), 'error');
        return false;
      }

    function maybeShowBrowserNotifications(markCurrentAsSeen){
      if (!notificationsSupported()) return;
      if (!(state.browserNotificationsEnabled && Notification.permission === 'granted')) return;
      const notices = getTopNotifications();
      const seen = new Set(state.shownBrowserNotificationIds || []);
      if (markCurrentAsSeen) {
        notices.forEach(n => seen.add(n.id));
        state.shownBrowserNotificationIds = Array.from(seen).slice(-200);
        saveLocal();
        return;
      }
      notices.forEach(n => {
        if (seen.has(n.id)) return;
        seen.add(n.id);
        try {
          const note = new Notification(n.title || 'Notification', {
            body: n.body || '',
            tag: n.id,
            renotify: false
          });
          note.onclick = function(){
            try { window.focus(); } catch(e) {}
            openNotification(n.id);
            try { note.close(); } catch(e) {}
          };
        } catch(e) {}
      });
      state.shownBrowserNotificationIds = Array.from(seen).slice(-200);
      saveLocal();
    }


    function canReachServer(){
      return typeof navigator === 'undefined' ? true : navigator.onLine !== false;
    }
    function updateSyncState(message, tone){
      const el = document.getElementById('syncState');
      if (!el) return;
      let text = message || 'Connected';
      if (!message) {
        if (!canReachServer()) text = state.pendingOps.length ? `Offline • ${state.pendingOps.length} queued` : 'Offline';
        else if (state.isSyncing) text = 'Syncing...';
        else if (state.pendingOps.length) text = `${state.pendingOps.length} queued`;
        else text = 'Connected';
      }
      el.textContent = text;
      el.style.background = tone === 'error' ? '#fef2f2' : tone === 'ok' ? '#ecfdf5' : tone === 'warn' ? '#fff7ed' : '#eff6ff';
      el.style.color = tone === 'error' ? '#991b1b' : tone === 'ok' ? '#166534' : tone === 'warn' ? '#c2410c' : '#1d4ed8';
    }
    function generateLocalId(prefix){
      return `${prefix}${Date.now()}${Math.floor(Math.random()*1000)}`;
    }
    function enqueueOperation(action, data, meta){
      const op = {
        opId: generateLocalId('OP'),
        action,
        data,
        createdAt: new Date().toISOString(),
        meta: meta || {}
      };
      state.pendingOps.push(op);
      saveLocal();
      updateSyncState();
      return op;
    }
    function removePendingFileForOp(op){
      if (!op || !op.meta || !op.meta.pendingFileKey) return;
      delete state.pendingFiles[op.meta.pendingFileKey];
    }
    function applyLocalRequestTransaction(entry){
      const tx = {
        TransactionID: String(entry.transactionId || generateLocalId('LOCALTRX')),
        UserID: String(entry.userId || ''),
        UserName: String(entry.userName || ''),
        RequestDate: String(entry.requestDate || ''),
        FinalDate: String(entry.finalDate || ''),
        RequestTime: String(entry.requestTime || currentSATime()),
        EntryType: String(entry.entryType || 'debit'),
        AmountRequested: Number(entry.amountRequested || 0),
        AmountFinal: entry.amountFinal === '' || entry.amountFinal === null || typeof entry.amountFinal === 'undefined' ? '' : Number(entry.amountFinal),
        Category: String(entry.category || ''),
        Supplier: String(entry.supplier || ''),
        Remark: String(entry.remark || ''),
        ReferenceNumber: String(entry.referenceNumber || ''),
        FileName: String(entry.fileName || ''),
        FileRef: String(entry.fileRef || ''),
        FileLink: String(entry.fileLink || ''),
        Status: String(entry.status || 'pending'),
        CreatedBy: String(entry.createdBy || ''),
        CreatedAt: String(entry.createdAt || new Date().toISOString()),
        UpdatedAt: new Date().toISOString(),
        ApprovedBy: String(entry.approvedBy || ''),
        SyncStatus: 'queued',
        IsBackdated: entry.isBackdated ? 'yes' : 'no'
      };
      updateTransactionInState(tx);
      return tx;
    }
    function applyQueuedCompletion(data){
      const tx = state.transactions.find(t => t.TransactionID === data.transactionId);
      if (!tx) return;
      tx.AmountFinal = Number(data.amountFinal || 0);
      tx.FinalDate = String(data.finalDate || tx.FinalDate || '');
      tx.Status = 'completed';
      tx.FileName = String(data.fileName || tx.FileName || '');
      tx.FileRef = String(data.fileRef || tx.FileRef || '');
      tx.FileLink = String(data.fileLink || tx.FileLink || '');
      tx.UpdatedAt = new Date().toISOString();
      tx.SyncStatus = 'queued';
    }
    function applyQueuedAdminUpdate(transactionId, status){
      const tx = state.transactions.find(t => t.TransactionID === transactionId);
      if (!tx) return;
      tx.Status = status;
      tx.UpdatedAt = new Date().toISOString();
      tx.SyncStatus = 'queued';
    }
    async function flushPendingOperations(options){
      const opts = options || {};
      if (state.isSyncing || !state.token || !state.pendingOps.length || !canReachServer()) {
        updateSyncState();
        return;
      }
      state.isSyncing = true;
      updateSyncState('Syncing...', 'info');
      try {
        const remaining = [];
        for (const op of state.pendingOps) {
          try {
            const result = await apiCall(op.action, op.data, { skipOfflineGuard: true });
            if (result && result.transaction) updateTransactionInState(result.transaction);
            removePendingFileForOp(op);
          } catch (err) {
            if (!canReachServer()) {
              remaining.push(op, ...state.pendingOps.slice(state.pendingOps.indexOf(op)+1));
              break;
            }
            remaining.push(op);
          }
        }
        state.pendingOps = remaining;
        saveLocal();
      } finally {
        state.isSyncing = false;
        updateSyncState();
      }
      if (state.token && canReachServer()) {
        try {
          await refreshFromBackend(false, { silent: true, skipQueueFlush: true });
        } catch (e) {}
      }
    }
    function startAutoSync(){
      stopAutoSync();
      if (!state.token) return;
      state.syncTimerId = setInterval(function(){
        if (!state.token) return;
        flushPendingOperations({ silent: true }).catch(()=>{});
        refreshFromBackend(false, { silent: true, skipQueueFlush: true }).catch(()=>{});
      }, SYNC_INTERVAL_MS);
      window.addEventListener('online', handleOnline);
      window.addEventListener('offline', handleOffline);
      updateSyncState();
    }
    function stopAutoSync(){
      if (state.syncTimerId) {
        clearInterval(state.syncTimerId);
        state.syncTimerId = null;
      }
      window.removeEventListener('online', handleOnline);
      window.removeEventListener('offline', handleOffline);
    }

    async function loginWithSavedCredentials_(showErrors){
      if(!state.apiUrl) throw new Error('Apps Script Web App URL is required.');
      const username = String(state.savedUsername || '').trim();
      const pin = String(state.savedPin || '').trim();
      if(!username || !pin) throw new Error('Saved login details are missing.');
      const response = await fetch(state.apiUrl, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ action:'login', data:{ username, pin } })
      });
      const text = await response.text();
      let json;
      try { json = JSON.parse(text); } catch(e) { throw new Error('Invalid server response: ' + text); }
      if(!json.ok) throw new Error(json.message || 'Login failed');
      state.token = json.token;
      state.user = json.user;
      state.sessionExpiresAt = new Date(Date.now() + SESSION_HOURS * 60 * 60 * 1000).toISOString();
      saveLocal();
      return json;
    }

    async function ensureActiveSession_(showErrors){
      if (sessionValid()) return true;
      if (!state.apiUrl || !state.savedUsername || !state.savedPin) return false;
      try {
        await loginWithSavedCredentials_(showErrors);
        return true;
      } catch (err) {
        if (showErrors) {
          const banner = document.getElementById('loginBanner');
          if (banner) {
            banner.className='banner error';
            banner.textContent = 'Session expired and saved login details are no longer valid. Please login again.';
          }
        }
        return false;
      }
    }

    function startSessionWatcher(){
      stopSessionWatcher();
      state.sessionTimerId = setInterval(async function(){
        if (!state.apiUrl || !state.savedUsername || !state.savedPin) return;
        if (sessionValid()) return;
        const ok = await ensureActiveSession_(false);

          await logout();
        }

    async function apiCall(action, data, options){
      const opts = options || {};
      if(!state.apiUrl) throw new Error('Apps Script URL missing.');
      if (!opts.skipOfflineGuard && !canReachServer()) {
        throw new Error('No internet connection.');
      }
      if (!opts.skipSessionRefresh && action !== 'login') {
        const ok = await ensureActiveSession_(false);
        if (!ok) throw new Error('Session expired. Please login again.');
      }
      const response = await fetch(state.apiUrl, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, token: state.token || '', data: data || {} })
      });
      const text = await response.text();
      let json;
      try { json = JSON.parse(text); } catch(e) { throw new Error('Invalid server response: ' + text); }
      if(!json.ok) throw new Error(json.message || 'Request failed');
      return json;
    }

    function calculateTotals(userId){
      const items = state.transactions.filter(t => t.UserID === userId);
      let allocated=0, explicitCredits=0, spent=0, pending=0, notCompleted=0;

      items.forEach(t => {
        const requested = Number(t.AmountRequested || 0);
        const finalUsed = Number(t.AmountFinal || 0);

        if (t.EntryType === 'credit' && t.Status === 'completed') {
          explicitCredits += Number(t.AmountFinal || t.AmountRequested || 0);
        }

        // In this flow, admin approval means money is already allocated.
        if (t.EntryType === 'debit' && t.Status === 'approved_request') {
          allocated += requested;
          notCompleted += requested;
        }

        // Completed requests still count as originally allocated,
        // then actual final used is deducted from that pool.
        if (t.EntryType === 'debit' && t.Status === 'completed') {
          allocated += requested;
          const paymentMethod = getPaymentMethod_(t);
          spent += paymentMethod === 'CASH' ? finalUsed : requested;
        }

        if (t.EntryType === 'debit' && t.Status === 'pending') {
          pending += requested;
        }
      });

      return {
        allocated,
        explicitCredits,
        spent,
        pending,
        notCompleted,
        balance: explicitCredits + allocated - spent
      };
    }

        year:'numeric',
        month:'2-digit',

        hour:'2-digit',

      }).format(dt);
    }

      const items = sortTransactionsNewestFirst(state.transactions);
      const notices = [];

      if (isAdmin()) {
        items.filter(t => t.EntryType === 'debit' && t.Status === 'pending').forEach(t => {
          notices.push({
            id: notificationIdFor(t, 'request'),
            kind: 'request',
            transactionId: t.TransactionID,
            userId: t.UserID,
            title: 'New request',
            body: `${t.UserName || 'User'} requested ${money(t.AmountRequested)} for ${titleCase(t.Category || 'expense')}.`,
            meta: `${t.RequestDate || ''} ${normalizeTimeValue(t.RequestTime || '')}`.trim(),

      } else if (state.user) {

        items.filter(t => t.UserID === userId && t.EntryType === 'debit' && t.Status === 'approved_request').forEach(t => {
          notices.push({
            id: notificationIdFor(t, 'approved'),

            transactionId: t.TransactionID,
            userId: t.UserID,
            title: 'Approved',

            meta: formatNoticeDate(t.UpdatedAt || t.CreatedAt || ''),

      if (/^\d{4}-\d{2}-\d{2}$/.test(String(value))) {

        const dt = new Date(Date.UTC(y, m - 1, d));
        return new Intl.DateTimeFormat('en-GB', { timeZone: SA_TIMEZONE, day:'numeric', month:'long', year:'numeric' }).format(dt);
      }
      const dt = new Date(value);
      if(isNaN(dt.getTime())) return String(value);
      return new Intl.DateTimeFormat('en-GB', { timeZone: SA_TIMEZONE, day:'numeric', month:'long', year:'numeric' }).format(dt);
    }

    function renderAddRequest(){
      const el=document.getElementById('screen-add-request');

    function clearRequestForm(){
      const dateEl = document.getElementById('requestDate');
      const amountEl = document.getElementById('requestAmount');
      const categoryEl = document.getElementById('requestCategory');
      const supplierEl = document.getElementById('requestSupplier');
      const paymentTypeEl = document.getElementById('requestPaymentType');
      const referenceEl = document.getElementById('requestReference');
      const remarkEl = document.getElementById('requestRemark');
      if (dateEl) dateEl.value = todayISO();

    function setActionButtonsDisabled(id, disabled){
      document.querySelectorAll(`[data-id="${id}"]`).forEach(btn => {
        btn.disabled = !!disabled;
        if (disabled) {
          btn.dataset.prevText = btn.textContent;
          btn.textContent = 'Please wait...';
        } else if (btn.dataset.prevText) {
          btn.textContent = btn.dataset.prevText;
          delete btn.dataset.prevText;
        }
      });
    }

    async function saveRequest(){
      const saveBtn = document.getElementById('saveRequestBtn');
      try{
        if (saveBtn){ saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; }
        const userId = isAdmin() ? document.getElementById('requestUserId').value : (state.user.userId || state.user.UserID);
        const requestDate = document.getElementById('requestDate').value;
        const amountRequested = Number(document.getElementById('requestAmount').value || 0);
        const category = document.getElementById('requestCategory').value;
        const supplier = document.getElementById('requestSupplier').value.trim();
        const paymentType = String(document.getElementById('requestPaymentType').value || 'CASH').trim().toUpperCase();
        const referenceNumber = encodeReferenceWithPayment_(document.getElementById('requestReference').value.trim(), paymentType);
        const remark = document.getElementById('requestRemark').value.trim();
        const userObj = state.users.find(u => (u.UserID || u.userId) === userId) || state.user;
        if(!requestDate) throw new Error('Date is required.');
        validateDateAgainstSettings(requestDate);
        if(!(amountRequested > 0)) throw new Error('Requested amount must be greater than zero.');
        if(!remark) throw new Error('Remark is required.');
        const entry = {
          transactionId: generateLocalId('TRX'),
          userId,
          userName:userObj.FullName || userObj.fullName,
          requestDate,
          finalDate:'',
          requestTime:currentSATime(),
          entryType:'debit',
          amountRequested,
          amountFinal:'',
          category,
          supplier,
          remark,
          referenceNumber,
          fileName:'',
          fileRef:'',
          fileLink:'',
          status:isAdmin() ? 'approved_request' : 'pending',
          createdBy:state.user.username || state.user.Username || '',
          createdAt:new Date().toISOString(),
          approvedBy:isAdmin() ? (state.user.username || state.user.Username || '') : '',
          isBackdated:requestDate < todayISO()
        };
        setBanner(canReachServer() ? 'Saving request...' : 'Offline. Request saved to queue.', canReachServer() ? 'info' : 'ok');
        try {
          await apiCall('syncEntries', { entries: [entry] });
          await refreshTransactionsOnly();
          setBanner('Expense request saved. You can add a new entry now.','ok');
        } catch(err){
          applyLocalRequestTransaction(entry);
          enqueueOperation('syncEntries', { entries: [entry] }, { type: 'request' });
          setBanner('No signal. Request saved on this device and queued for next sync.','ok');
        }
        clearRequestForm();
        renderDashboard();
        renderMyEntries();
        renderAddRequest();
        if (isAdmin()) renderTransactions();
        showScreen('add-request');
        alert('Entry saved.');
      } catch(err){
        setBanner(err.message,'error');
      } finally {
        if (saveBtn){ saveBtn.disabled = false; saveBtn.textContent = 'Save Request'; }
        saveLocal();
        updateSyncState();
      }
    }

    function renderTransactions(){
      const el=document.getElementById('screen-transactions');
      if(!isAdmin()){ el.innerHTML=''; return; }
      const userOptions=['<option value="all">All Users</option>'].concat(
        state.users.filter(u => (u.Role || u.role)==='user').map(u=>`<option value="${u.UserID || u.userId}" ${(state.selectedAdminUserId === (u.UserID || u.userId)) ? 'selected' : ''}>${escapeHtml(u.FullName || u.fullName)}</option>`)
      ).join('');
      el.innerHTML=`<div class="card stack"><div class="row-3"><label><div class="small muted">Status Filter</div><select id="transactionStatusFilter"><option value="all">All Statuses</option><option value="pending">Pending</option><option value="approved_request">Approved Request</option><option value="completed">Completed</option><option value="rejected">Rejected</option><option value="backdated">Backdated Only</option></select></label><label><div class="small muted">User Filter</div><select id="transactionUserFilter">${userOptions}</select></label><label><div class="small muted">Transaction Type</div><select id="transactionTypeFilter"><option value="all">All Types</option><option value="credit">Credits Only</option><option value="debit">Debits Only</option></select></label></div><div id="transactionsTableWrap"></div></div>`;
      const statusEl=document.getElementById('transactionStatusFilter');
      const userEl=document.getElementById('transactionUserFilter');
      const typeEl=document.getElementById('transactionTypeFilter');
      const renderFiltered=()=>{
        let items=sortTransactionsNewestFirst(state.transactions);
        const status=statusEl.value, user=userEl.value, type=typeEl.value;
        if(status==='backdated') items=items.filter(t=>String(t.IsBackdated || '').toLowerCase()==='yes');
        else if(status!=='all') items=items.filter(t=>t.Status===status);
        if(user!=='all') items=items.filter(t=>t.UserID===user);
        if(type!=='all') items=items.filter(t=>t.EntryType===type);
        let summaryHtml = '';
        if (user !== 'all') {
          const selectedUser = state.users.find(u => (u.UserID || u.userId) === user);
          const totals = calculateTotals(user);
          summaryHtml = `<div class="grid grid-4" style="margin-bottom:12px;"><div class="card stat"><div class="small">User</div><div class="value" style="font-size:18px;">${escapeHtml((selectedUser && (selectedUser.FullName || selectedUser.fullName)) || user)}</div></div><div class="card stat"><div class="small">Balance</div><div class="value ${totals.balance>=0?'success':'danger'}">${money(totals.balance)}</div></div><div class="card stat"><div class="small">Pending Requests</div><div class="value">${money(totals.pending)}</div></div><div class="card stat"><div class="small">Not Completed</div><div class="value">${money(totals.notCompleted)}</div></div></div>`;
        }
        document.getElementById('transactionsTableWrap').innerHTML=`${summaryHtml}<h2 class="section-title">All Transactions</h2>${renderTransactionTable(items,true,true)}`;
        bindAdminButtons();
        bindSlipUploadButtons(); bindCompleteButtons();
      };
      statusEl.addEventListener('change',renderFiltered);
      userEl.addEventListener('change',()=>{ state.selectedAdminUserId = userEl.value; renderFiltered(); });
      typeEl.addEventListener('change',renderFiltered);
      renderFiltered();
    }

      const el=document.getElementById('screen-settings');
      if(!isAdmin()){ el.innerHTML=''; return; }

    function renderSlipCell(t){
      const fileName = String(t.FileName || '').trim();
      const fileLink = String(t.FileLink || '').trim();
      if (!fileName) return '-';
      if (fileLink) {
        return `<a href="${escapeHtml(fileLink)}" target="_blank" rel="noopener noreferrer">📎 ${escapeHtml(fileName)}</a>`;
      }
      return '📎 ' + escapeHtml(fileName);
    }

    function renderStatusPill(t){
      const map={ pending:['#fef3c7','#92400e','Pending'], approved_request:['#dbeafe','#1d4ed8','Approved Request'], completed:['#ecfdf5','#166534','Completed'], rejected:['#fee2e2','#991b1b','Rejected'] };
      const item=map[t.Status];
      if(!item) return '-';
      return `<span class="pill" style="background:${item[0]};color:${item[1]};">${item[2]}</span>`;
    }
    function renderFlags(t){ return String(t.IsBackdated || '').toLowerCase()==='yes' ? '<span class="pill" style="background:#fff7ed;color:#c2410c;">Backdated</span>' : '-'; }
    function renderAdminActionCell(t){
      if(!isAdmin()) return '-';
      if(t.EntryType==='debit' && t.Status==='pending') return `<div class="actions"><button type="button" class="success-btn approve-request-btn" data-id="${t.TransactionID}">Approve Request</button><button type="button" class="danger-btn reject-btn" data-id="${t.TransactionID}">Reject</button></div>`;
      if(t.EntryType==='debit' && t.Status==='approved_request') return '<span class="small muted">Waiting for user slip</span>';
      return '-';
    }
    function renderCompleteCell(t){
      if(t.EntryType!=='debit' || t.Status!=='approved_request') return '-';
      if(!isAdmin() && t.UserID !== (state.user.userId || state.user.UserID)) return '-';
      const pending = state.pendingFiles[t.TransactionID];
      if(!pending){
        return `<div class="stack"><button type="button" class="secondary upload-slip-btn" data-id="${t.TransactionID}">Attach Slip</button><div class="small muted">Attach a file before completing.</div></div>`;
      }
      return `<div class="stack"><div class="small muted">Attached: ${escapeHtml(pending.name)}</div><div class="actions"><button type="button" class="secondary replace-slip-btn" data-id="${t.TransactionID}">Attach New Slip</button><button type="button" class="danger-btn remove-slip-btn" data-id="${t.TransactionID}">Remove Slip</button></div><button type="button" class="complete-btn" data-id="${t.TransactionID}">Complete Transaction</button></div>`;
    }

    function renderTransactionTable(items,showUser,showComplete){
      items = sortTransactionsNewestFirst(items);
      if(!items.length) return '<div class="muted">No entries found.</div>';
      return `<div style="overflow:auto;"><table><thead><tr><th>Date</th>${showUser?'<th>User</th>':''}<th>Type</th><th>Category</th><th>Remark</th><th>Requested</th><th>Final</th><th>Status</th><th>Flags</th><th>Slip</th>${isAdmin()?'<th>Admin Action</th>':''}${showComplete?'<th>Complete</th>':''}</tr></thead><tbody>${items.map(t=>{
        const txDate = formatSADateOnly(t.FinalDate || t.RequestDate || '');
        const txTime = normalizeTimeValue(t.RequestTime || '');
        const txMain = [txDate, txTime].filter(Boolean).join(' ');
        return `<tr><td class="nowrap">${escapeHtml(txMain)}</td>${showUser?`<td>${escapeHtml(t.UserName || '')}</td>`:''}<td><span class="entry-type ${t.EntryType}">${escapeHtml(t.EntryType)}</span></td><td>${escapeHtml(titleCase(t.Category || ''))}</td><td><div>${escapeHtml(t.Remark || '')}</div><div class="small muted">Payment: ${escapeHtml(getPaymentMethod_(t))}</div>${getDisplayReferenceNumber_(t)?`<div class="small muted">Ref: ${escapeHtml(getDisplayReferenceNumber_(t))}</div>`:''}${t.Supplier?`<div class="small muted">${escapeHtml(t.Supplier)}</div>`:''}</td><td class="right">${money(t.AmountRequested)}</td><td class="right">${t.AmountFinal===''||t.AmountFinal==null?'-':money(t.AmountFinal)}</td><td>${renderStatusPill(t)}</td><td>${renderFlags(t)}</td><td>${renderSlipCell(t)}</td>${isAdmin()?`<td>${renderAdminActionCell(t)}</td>`:''}${showComplete?`<td>${renderCompleteCell(t)}</td>`:''}</tr>`;
      }).join('')}</tbody></table></div>`;
    }

    function bindAdminButtons(){
      document.querySelectorAll('.approve-request-btn').forEach(btn=>btn.addEventListener('click',()=>approveRequest(btn.dataset.id)));
      document.querySelectorAll('.reject-btn').forEach(btn=>btn.addEventListener('click',()=>rejectRequest(btn.dataset.id)));
    }
    async function approveRequest(id){
      setActionButtonsDisabled(id, true);
      try{
        try {
          const result = await apiCall('approveRequest',{ transactionId:id });
          if (result.transaction) updateTransactionInState(result.transaction);
          setBanner('Request approved.','ok');
        } catch (err) {
          applyQueuedAdminUpdate(id, 'approved_request');
          enqueueOperation('approveRequest', { transactionId:id }, { type: 'approve' });
          setBanner('No signal. Approval queued for next sync.','ok');
        }
        renderDashboard(); renderTransactions(); renderMyEntries(); showScreen('transactions');
      }catch(err){
        setActionButtonsDisabled(id, false);
        setBanner(err.message,'error');
      } finally {
        saveLocal();
        updateSyncState();
      }
    }
    async function rejectRequest(id){
      setActionButtonsDisabled(id, true);
      try{
        try {
          const result = await apiCall('rejectRequest',{ transactionId:id });
          if (result.transaction) updateTransactionInState(result.transaction);
          setBanner('Request rejected.','ok');
        } catch (err) {
          applyQueuedAdminUpdate(id, 'rejected');
          enqueueOperation('rejectRequest', { transactionId:id }, { type: 'reject' });
          setBanner('No signal. Rejection queued for next sync.','ok');
        }
        renderDashboard(); renderTransactions(); renderMyEntries(); showScreen('transactions');
      }catch(err){
        setActionButtonsDisabled(id, false);
        setBanner(err.message,'error');
      } finally {
        saveLocal();
        updateSyncState();
      }
    }

    function bindSlipUploadButtons(){
      document.querySelectorAll('.upload-slip-btn').forEach(btn=>btn.addEventListener('click',()=>pickSlipForTransaction(btn.dataset.id)));
      document.querySelectorAll('.replace-slip-btn').forEach(btn=>btn.addEventListener('click',()=>pickSlipForTransaction(btn.dataset.id)));
      document.querySelectorAll('.remove-slip-btn').forEach(btn=>btn.addEventListener('click',()=>removeSlipForTransaction(btn.dataset.id)));
    }
    function removeSlipForTransaction(id){
      if(!state.pendingFiles[id]) return;
      delete state.pendingFiles[id];
      renderTransactions();
      renderMyEntries();
      showScreen(isAdmin() ? 'transactions' : 'my-entries');
      setBanner('Attached slip removed. You can attach a new file.', 'ok');
    }
    async function pickSlipForTransaction(id){
      try{
        const picked = await new Promise((resolve, reject) => {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = '.jpg,.jpeg,.png,.pdf,.webp,image/*,application/pdf';
          input.style.display = 'none';
          document.body.appendChild(input);
          input.addEventListener('change', () => {
            const file = input.files && input.files[0] ? input.files[0] : null;
            document.body.removeChild(input);
            if (!file) { resolve(null); return; }
            const reader = new FileReader();
            reader.onload = () => {
              const result = String(reader.result || '');
              const base64 = result.includes(',') ? result.split(',')[1] : result;
              resolve({
                name: file.name || 'attachment',
                mimeType: file.type || 'application/octet-stream',
                base64
              });
            };
            reader.onerror = () => reject(new Error('Could not read the selected file.'));
            reader.readAsDataURL(file);
          }, { once:true });
          input.click();
        });
        if(!picked) return;
        state.pendingFiles[id] = picked;
        renderTransactions();
        renderMyEntries();
        showScreen(isAdmin() ? 'transactions' : 'my-entries');
        setBanner('Slip attached. You can now complete the transaction.', 'ok');
      } catch(err){
        setBanner(err.message, 'error');
      }
    }

    function bindCompleteButtons(){
      document.querySelectorAll('.complete-btn').forEach(btn=>btn.addEventListener('click',()=>completeExpense(btn.dataset.id)));
    }
    async function completeExpense(id){
      setActionButtonsDisabled(id, true);
      try {
        const tx = state.transactions.find(t => t.TransactionID === id);
        if(!tx) throw new Error('Transaction not found.');

        const pending = state.pendingFiles[id];
        if(!pending) throw new Error('Please attach a slip before completing the transaction.');

        const finalDate = window.prompt('Enter final date used (YYYY-MM-DD):', todayISO());
        if(finalDate === null) {
          setActionButtonsDisabled(id, false);
          return;
        }

        validateDateAgainstSettings(finalDate.trim());

        const finalAmount = window.prompt('Enter final amount used:', tx.AmountRequested || '');
        if(finalAmount === null) {
          setActionButtonsDisabled(id, false);
          return;
        }
        const payload = {
          transactionId: id,
          amountFinal: Number(finalAmount),
          finalDate: finalDate.trim(),
          fileName: pending.name,
          fileMimeType: pending.mimeType,
          fileDataBase64: pending.base64,
          fileRef: '',
          fileLink: ''
        };

        try {
          const result = await apiCall('completeExpense', payload);
          delete state.pendingFiles[id];
          if (result.transaction) updateTransactionInState(result.transaction);
          setBanner('Expense completed.','ok');
        } catch(err) {
          applyQueuedCompletion(payload);
          enqueueOperation('completeExpense', payload, { type: 'complete', pendingFileKey: id });
          setBanner('No signal. Completion saved to queue and will upload on next sync.','ok');
        }
        renderDashboard();
        renderTransactions();
        renderMyEntries();
        showScreen(isAdmin() ? 'transactions' : 'my-entries');
      } catch(err) {
        setActionButtonsDisabled(id, false);
        setBanner(err.message,'error');
      } finally {
        saveLocal();
        updateSyncState();
      }
    }

    function updateTransactionInState(transaction){
      const idx = state.transactions.findIndex(t => t.TransactionID === transaction.TransactionID);
      if (idx >= 0) state.transactions[idx] = transaction;
      else state.transactions.unshift(transaction);
    }

    async function refreshTransactionsOnly(){
      const result = await apiCall('getTransactions', {});
      state.transactions = result.transactions || [];
      state.lastSyncAt = result.serverTime || new Date().toISOString();
      saveLocal();
    }
    async function getChangesSince(){
      const result = await apiCall('getChangesSince', { since: state.lastSyncAt || '' });
      const changed = result.transactions || [];
      if (changed.length) changed.forEach(updateTransactionInState);
      state.lastSyncAt = result.serverTime || new Date().toISOString();
      saveLocal();
    }
    async function refreshFromBackend(full, options){
      const opts = options || {};
      if(!state.token) return;
      if (!canReachServer()) {
        updateSyncState();
        if (!opts.silent) renderApp();
        return;
      }
      state.isSyncing = true;
      updateSyncState('Syncing...', 'info');
      try {
        if (!opts.skipQueueFlush) await flushPendingOperations({ silent: true });
        if (full) {
          const data = await apiCall('bootstrap', {}, { skipOfflineGuard: true });
          state.settings = data.settings || state.settings;
          state.categories = data.categories || state.categories;
          state.users = data.users || [];
          state.transactions = data.transactions || [];
          state.lastSyncAt = data.serverTime || new Date().toISOString();
          saveLocal();
        } else {
          await getChangesSince();
        }
      } finally {
        state.isSyncing = false;
        updateSyncState();
      }
      renderApp();
    }

    function renderApp(){
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      const loginBtn = document.getElementById('loginBtn');
      const banner = document.getElementById('loginBanner');
      if (loginBtn) {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
      if (banner) {
        banner.className='banner info';
        banner.textContent='Paste your Apps Script Web App URL below, then login.';
      }
      document.getElementById('userWelcome').textContent = (state.user.fullName || state.user.FullName) + ' • ' + (state.user.role || state.user.Role);
      renderTabs(); renderDashboard(); renderAddRequest(); renderMyEntries(); if (typeof renderLoadMoney === 'function') renderTransactions(); renderUsers(); renderSettings(); showScreen('dashboard');
      const enableBtn = document.getElementById('enableNotificationsBtn');
      if (enableBtn) enableBtn.onclick = function(){ enableBrowserNotifications(); };
      syncNotificationButton();
      if (typeof renderTopNotifications === 'function') renderTopNotifications();
      if (typeof bindNotificationBell === 'function') bindNotificationBell();
      updateSyncState();
      startAutoSync();
      startSessionWatcher();
      syncExistingPushSubscription().catch(()=>{});
    }

    async function login(){
      const banner = document.getElementById('loginBanner');
      const loginBtn = document.getElementById('loginBtn');
      try {
        if (loginBtn) {
          loginBtn.disabled = true;
          loginBtn.textContent = 'Logging in...';
        }
        if (banner) {
          banner.className = 'banner info';
          banner.textContent = 'Logging in...';
        }

        state.apiUrl = document.getElementById('loginApiUrl').value.trim();
        const username = document.getElementById('loginUsername').value.trim();
        const pin = document.getElementById('loginPin').value.trim();
        state.savedUsername = username;
        state.savedPin = pin;

        if(!state.apiUrl) throw new Error('Apps Script Web App URL is required.');

        const response = await fetch(state.apiUrl, {
          method:'POST',
          headers:{ 'Content-Type':'text/plain;charset=utf-8' },
          body: JSON.stringify({ action:'login', data:{ username, pin } })
        });

        const text = await response.text();
        const json = JSON.parse(text);
        if(!json.ok) throw new Error(json.message || 'Login failed');

        state.token = json.token;
        state.user = json.user;
        state.sessionExpiresAt = new Date(Date.now() + SESSION_HOURS * 60 * 60 * 1000).toISOString();
        saveLocal();

        await refreshFromBackend(true);

        if (loginBtn) {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
        if (banner) {
          banner.className = 'banner info';
          banner.textContent = 'Paste your Apps Script Web App URL below, then login.';
        }
      } catch(err) {
        if (banner) {
          banner.className='banner error';
          banner.textContent = err.message;
        }
        if (loginBtn) {
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      }
    }

    async function logout(){
      stopAutoSync();
      stopSessionWatcher();
      try { await removeExistingPushSubscriptionFromServer(); } catch (e) {}
      state.token='';
      state.user=null;
      state.savedUsername='';
      state.savedPin='';
      state.notificationsOpen=false;
      state.pendingBlinkId='';
      state.lastSyncAt='';
      saveLocal();
      clearLocal();
      document.getElementById('appView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      const banner = document.getElementById('loginBanner');
      const loginBtn = document.getElementById('loginBtn');
      if (banner) {
        banner.className='banner info';
        banner.textContent='Paste your Apps Script Web App URL below, then login.';
      }
      if (loginBtn) {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
      updateSyncState();
    }

    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('refreshBtn').addEventListener('click', async()=>{ try{ await flushPendingOperations(); await refreshFromBackend(true, { skipQueueFlush: true }); setBanner('Data refreshed.','ok'); } catch(err){ setBanner(err.message,'error'); } });

    registerServiceWorker();
    bindInstallPrompt();
    loadLocal();
    document.getElementById('loginApiUrl').value = state.apiUrl || '';
    initFirebaseMessaging().catch(()=>{});
    if(sessionValid() && state.user && state.apiUrl){
      renderApp();
      refreshFromBackend(true).catch(()=>{ updateSyncState(); renderApp(); });
    }
    else if(state.apiUrl && state.savedUsername && state.savedPin){
      ensureActiveSession_(false).then(function(ok){
        if(ok && state.user){
          renderApp();
          refreshFromBackend(true).catch(()=>{ updateSyncState(); renderApp(); });
        } else {
          state.token=''; state.user=null; state.sessionExpiresAt=''; state.lastSyncAt=''; saveLocal();
        }
      }).catch(function(){
        state.token=''; state.user=null; state.sessionExpiresAt=''; state.lastSyncAt=''; saveLocal();
      });
    }
  </script>
</body>
</html>
